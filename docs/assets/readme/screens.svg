<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">WClock screen modes</title>
  <desc id="desc">Three illustrated screens: photo wall, photo frame, and settings.</desc>
  <rect width="1200" height="520" fill="#ffffff"/>
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2d4b62"/>
      <stop offset="1" stop-color="#090c12"/>
