      <stop offset="1" stop-color="#1b2531"/>
    </linearGradient>
    <linearGradient id="settings" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11191f"/>
      <stop offset="1" stop-color="#1f272e"/>
    </linearGradient>
  </defs>
  <g font-family="Segoe UI, Arial, sans-serif">
