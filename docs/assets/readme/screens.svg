      <path d="M16 186 C92 128, 210 118, 302 58 L302 264 L16 264 Z" fill="#1b2838" opacity="0.42"/>
      <rect x="34" y="194" width="110" height="50" rx="6" fill="#020408" opacity="0.72"/>
      <text x="50" y="226" font-size="28" font-weight="700" fill="#fff">08 12</text>
      <rect x="178" y="188" width="104" height="56" rx="6" fill="#020408" opacity="0.58"/>
      <text x="194" y="213" font-size="14" fill="#fff">Погода</text>
