<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">WClock tablet preview</title>
  <desc id="desc">Tablet preview with photo wall, clock panel and weather panel.</desc>
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#213142"/>
      <stop offset="0.55" stop-color="#111820"/>
      <stop offset="1" stop-color="#06090d"/>
    </linearGradient>
    <linearGradient id="photo1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9edf2"/>
      <stop offset="1" stop-color="#28485a"/>
