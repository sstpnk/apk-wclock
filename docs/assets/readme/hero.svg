      <stop offset="1" stop-color="#253b58"/>
    </linearGradient>
    <linearGradient id="photo3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b8d6a8"/>
      <stop offset="1" stop-color="#2a4a35"/>
