<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">WClock on a tablet</title>
  <desc id="desc">A tablet-style illustration of WClock showing a photo wall, clock, weather panel, and forecast.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#223142"/>
      <stop offset="0.45" stop-color="#111820"/>
      <stop offset="1" stop-color="#06090d"/>
    </linearGradient>
    <linearGradient id="photoA" x1="0" y1="0" x2="1" y2="1">
